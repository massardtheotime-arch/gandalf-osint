<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Gandalf OSINT</title>
  <style>
    :root {
      --bg:      #0f0f13;
      --card:    #1a1a24;
      --card2:   #13131b;
      --border:  #2a2a3a;
      --sel:     #2e2416;
      --accent:  #c8922a;
      --accent2: #e8b84b;
      --text:    #e8e8f0;
      --muted:   #5a5a7a;
      --green:   #4ade80;
      --red:     #f87171;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, "Helvetica Neue", Arial, sans-serif;
      font-size: 14px;
      overflow: hidden;
    }

    /* ── Layout ── */
    #app {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    #scroll {
      flex: 1;
      overflow-y: auto;
      padding: 0 40px 20px;
    }

    #scroll::-webkit-scrollbar { width: 6px; }
    #scroll::-webkit-scrollbar-track { background: transparent; }
    #scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* ── Header ── */
    .header {
      text-align: center;
      padding: 28px 0 0;
    }

    .gandalf-gif {
      max-height: 140px;
      display: block;
      margin: 0 auto 10px;
    }

    h1 {
      font-family: Georgia, serif;
      font-size: 40px;
      color: var(--accent2);
      margin-bottom: 8px;
    }

    .byline {
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .byline a {
      color: var(--accent);
      text-decoration: underline;
      cursor: pointer;
    }
    .byline a:hover { color: var(--accent2); }

    .subtitle {
      font-size: 13px;
      color: var(--text);
      letter-spacing: 0.08em;
      margin-bottom: 16px;
    }

    .pills {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 7px;
      margin-bottom: 24px;
    }

    .pill {
      background: var(--card);
      color: var(--text);
      font-size: 11px;
      padding: 5px 14px;
      border-radius: 20px;
      border: 1px solid var(--border);
    }

    /* ── Divider ── */
    hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 0 0 18px;
    }

    /* ── Card ── */
    .card {
      background: var(--card);
      border-radius: 10px;
      padding: 22px 26px;
      margin-bottom: 14px;
    }

    .card-title {
      font-size: 14px;
      font-weight: 700;
      color: var(--accent2);
      margin-bottom: 4px;
    }

    .card-sub {
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 14px;
    }

    /* ── Textarea ── */
    textarea {
      width: 100%;
      background: var(--card2);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 7px;
      font-size: 13px;
      font-family: inherit;
      padding: 13px 15px;
      resize: vertical;
      outline: none;
      min-height: 85px;
      transition: border-color 0.15s;
    }
    textarea:focus { border-color: var(--accent); }
    textarea.ph    { color: var(--muted); }

    /* ── Buttons ── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      border: none;
      border-radius: 7px;
      font-size: 13px;
      font-weight: 700;
      padding: 11px 26px;
      cursor: pointer;
      transition: background 0.15s, opacity 0.15s, transform 0.1s;
      font-family: inherit;
    }
    .btn:active:not(:disabled) { transform: scale(0.97); }
    .btn:disabled { opacity: 0.4; cursor: default; }

    .btn-primary { background: var(--accent); color: #0a0a0e; }
    .btn-primary:hover:not(:disabled) { background: var(--accent2); }

    .btn-secondary {
      background: var(--card2);
      color: var(--accent);
      border: 1px solid var(--border);
    }
    .btn-secondary:hover:not(:disabled) { border-color: var(--accent); }

    .row { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }

    /* ── Video result card ── */
    .video-card {
      background: var(--card);
      border-radius: 10px;
      padding: 20px 24px;
      margin-bottom: 12px;
      animation: fadeIn 0.25s ease;
    }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; } }

    .video-header {
      display: flex;
      gap: 18px;
      align-items: flex-start;
      margin-bottom: 16px;
    }

    .thumb-wrap {
      width: 140px;
      height: 79px;
      background: #0a0a0e;
      border-radius: 6px;
      overflow: hidden;
      flex-shrink: 0;
    }

    .thumb-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .video-info { flex: 1; min-width: 0; }

    .video-title {
      font-size: 14px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 10px;
      line-height: 1.4;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }

    .meta-pills { display: flex; gap: 7px; flex-wrap: wrap; }

    .meta-pill {
      background: var(--border);
      color: var(--muted);
      font-size: 10px;
      padding: 3px 9px;
      border-radius: 3px;
    }

    .q-section-label {
      font-size: 9px;
      font-weight: 700;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .quality-grid { display: flex; flex-wrap: wrap; gap: 8px; }

    .qbtn {
      border: 1px solid var(--border);
      background: var(--card2);
      border-radius: 7px;
      padding: 10px 16px;
      cursor: pointer;
      text-align: center;
      min-width: 78px;
      transition: border-color 0.15s, background 0.15s;
      user-select: none;
    }
    .qbtn:hover     { border-color: var(--accent); }
    .qbtn.selected  { border-color: var(--accent); background: var(--sel); }

    .q-badge  { font-size: 8px; font-weight: 700; margin-bottom: 2px; }
    .q-label  { font-size: 15px; font-weight: 700; color: var(--text); }
    .q-size   { font-size: 9px; color: var(--muted); margin-top: 2px; }

    /* ── XLSX status ── */
    .xlsx-status       { font-size: 12px; color: var(--muted); }
    .xlsx-status.ok    { color: var(--green); }
    .xlsx-status.error { color: var(--red); }

    /* ── Progress ── */
    #prog-wrap {
      padding: 4px 40px 0;
      flex-shrink: 0;
    }

    #prog-bar {
      width: 100%;
      height: 7px;
      appearance: none;
      border: none;
      display: block;
    }
    #prog-bar::-webkit-progress-bar   { background: var(--border); border-radius: 4px; }
    #prog-bar::-webkit-progress-value { background: var(--accent); border-radius: 4px; transition: width 0.3s; }

    #status-txt {
      font-size: 11px;
      color: var(--text);
      margin-top: 5px;
      min-height: 16px;
      padding: 0 2px;
    }

    /* ── Log ── */
    #log-wrap { padding: 6px 40px 8px; flex-shrink: 0; }

    #log-box {
      background: var(--card);
      color: var(--green);
      font-family: "Courier New", monospace;
      font-size: 11px;
      padding: 10px 14px;
      height: 76px;
      overflow-y: auto;
      border: 1px solid var(--border);
      border-radius: 7px;
      white-space: pre-wrap;
      word-break: break-all;
    }
    #log-box::-webkit-scrollbar { width: 4px; }
    #log-box::-webkit-scrollbar-thumb { background: var(--border); }

    /* ── Bottom bar ── */
    #bottom {
      background: var(--card);
      border-top: 1px solid var(--border);
      padding: 14px 40px;
      flex-shrink: 0;
    }

    .bottom-inner {
      display: flex;
      align-items: flex-start;
      gap: 40px;
    }

    .tc-section { flex: 1; }

    .section-lbl {
      font-size: 10px;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.07em;
      margin-bottom: 8px;
    }

    .radio-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 12px; }

    .radio-opt {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: var(--text);
      cursor: pointer;
    }
    .radio-opt input { accent-color: var(--accent); cursor: pointer; }

    .folder-row { display: flex; align-items: center; gap: 10px; }

    .folder-path {
      font-size: 12px;
      color: var(--muted);
      max-width: 280px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
  </style>
</head>
<body>
<div id="app">

  <!-- ── Scrollable area ── -->
  <div id="scroll">

    <!-- Header -->
    <div class="header">
      <img src="gandalf.gif" class="gandalf-gif" onerror="this.style.display='none'">
      <h1>Gandalf OSINT</h1>
      <div class="byline">Fait par <a onclick="openCreator()">Théotime Massard</a></div>
      <div class="subtitle">VIDÉOS &bull; AUDIO &bull; OSINT</div>
      <div class="pills" id="pills"></div>
    </div>

    <hr>

    <!-- URL card -->
    <div class="card">
      <textarea id="url-input" class="ph" rows="4"
        onfocus="clearPh(this)" onblur="addPh(this)"
      >Colle un ou plusieurs liens (un par ligne)...</textarea>
      <div style="margin-top:14px">
        <button class="btn btn-primary" id="analyse-btn" onclick="analyseUrls()">✦&nbsp; Analyser</button>
      </div>
    </div>

    <hr>

    <!-- XLSX card -->
    <div class="card">
      <div class="card-title">📊&nbsp; IMPORT EXCEL (.xlsx)</div>
      <div class="card-sub">Colonnes requises : key &nbsp;·&nbsp; publication_date &nbsp;·&nbsp; description &nbsp;·&nbsp; location &nbsp;·&nbsp; link</div>
      <div class="row">
        <button class="btn btn-secondary" onclick="importXlsx()">📂&nbsp; Importer .xlsx</button>
        <span class="xlsx-status" id="xlsx-status">Aucun fichier importé</span>
      </div>
      <div style="margin-top:14px">
        <button class="btn btn-primary" id="xlsx-dl-btn" onclick="downloadXlsx()">✦&nbsp; Télécharger (Excel)</button>
      </div>
    </div>

    <!-- Video results -->
    <div id="results"></div>

  </div><!-- /scroll -->

  <!-- Progress -->
  <div id="prog-wrap">
    <progress id="prog-bar" value="0" max="100"></progress>
    <div id="status-txt"></div>
  </div>

  <!-- Log -->
  <div id="log-wrap">
    <div id="log-box"></div>
  </div>

  <!-- Bottom bar -->
  <div id="bottom">
    <div class="bottom-inner">
      <div class="tc-section">
        <div class="section-lbl">Transcodage</div>
        <div class="radio-group">
          <label class="radio-opt">
            <input type="radio" name="tc" value="none" onchange="setTc('none')">
            Aucun — garder le fichier source
          </label>
          <label class="radio-opt">
            <input type="radio" name="tc" value="prores" checked onchange="setTc('prores')">
            Apple ProRes 422 LT &nbsp;(.mov)
          </label>
          <label class="radio-opt">
            <input type="radio" name="tc" value="mp4" onchange="setTc('mp4')">
            MP4 H.264 — compatible Premiere Pro &nbsp;(.mp4)
          </label>
        </div>
        <div class="folder-row">
          <span style="font-size:18px">📁</span>
          <span class="folder-path" id="folder-path">~/Downloads</span>
          <button class="btn btn-secondary" onclick="chooseDir()"
            style="padding:6px 14px;font-size:12px">Changer</button>
        </div>
      </div>
      <div style="align-self:center">
        <button class="btn btn-primary" id="dl-btn" onclick="downloadAll()"
          style="font-size:15px;padding:14px 38px">✦&nbsp; Télécharger</button>
      </div>
    </div>
  </div>

</div><!-- /app -->

<script>
  const PLATFORMS = ["YouTube","TikTok","Instagram","Twitter","Facebook","Vimeo","Dailymotion","Telegram"];
  const PH = "Colle un ou plusieurs liens (un par ligne)...";

  let videoInfos = [];

  // Pills
  const pillsEl = document.getElementById('pills');
  PLATFORMS.forEach(p => {
    const el = document.createElement('span');
    el.className = 'pill';
    el.textContent = p;
    pillsEl.appendChild(el);
  });

  // Placeholder
  function clearPh(el) { if (el.value === PH) { el.value = ''; el.classList.remove('ph'); } }
  function addPh(el)   { if (!el.value.trim()) { el.value = PH; el.classList.add('ph'); } }

  // Event bus from Python
  window.onEvent = function(type, data) {
    switch (type) {
      case 'log':             appendLog(data);          break;
      case 'status':          setStatus(data);           break;
      case 'progress':        setProgress(data);         break;
      case 'video_analysed':  addVideoCard(data);        break;
      case 'analyse_done':    onAnalyseDone();           break;
      case 'download_started': onDlStarted();            break;
      case 'download_done':   onDlDone();                break;
    }
  };

  function appendLog(msg) {
    const b = document.getElementById('log-box');
    b.textContent += msg + '\n';
    b.scrollTop = b.scrollHeight;
  }

  function setStatus(msg) { document.getElementById('status-txt').textContent = msg; }
  function setProgress(v) { document.getElementById('prog-bar').value = v; }

  // ── Analyse ──
  function analyseUrls() {
    const input = document.getElementById('url-input');
    const text  = input.classList.contains('ph') ? '' : input.value;
    if (!text.trim()) return;
    videoInfos = [];
    document.getElementById('results').innerHTML = '';
    document.getElementById('analyse-btn').disabled = true;
    setStatus('Analyse en cours…');
    pywebview.api.analyse_urls(text);
  }

  function onAnalyseDone() {
    document.getElementById('analyse-btn').disabled = false;
  }

  // ── Video card ──
  function addVideoCard(info) {
    videoInfos.push(info);
    const idx = videoInfos.length - 1;

    const card = el('div', 'video-card');
    card.id = `vc-${idx}`;

    // Header
    const hdr = el('div', 'video-header');

    const tw = el('div', 'thumb-wrap');
    if (info.thumb_url) {
      const img = document.createElement('img');
      img.src = info.thumb_url;
      img.onerror = () => img.remove();
      tw.appendChild(img);
    }
    hdr.appendChild(tw);

    const inf = el('div', 'video-info');
    const ttl = el('div', 'video-title');
    ttl.textContent = info.title;
    inf.appendChild(ttl);

    const mp = el('div', 'meta-pills');
    [info.dur, info.views, info.channel].filter(Boolean).forEach(t => {
      const p = el('span', 'meta-pill');
      p.textContent = t;
      mp.appendChild(p);
    });
    inf.appendChild(mp);
    hdr.appendChild(inf);
    card.appendChild(hdr);

    // Quality
    const ql = el('div', 'q-section-label');
    ql.textContent = 'CHOISIR LA QUALITÉ';
    card.appendChild(ql);

    const grid = el('div', 'quality-grid');
    info.formats.forEach((fmt, fi) => {
      const btn = el('div', 'qbtn' + (fi === 0 ? ' selected' : ''));
      btn.id = `q-${idx}-${fi}`;

      const badge = el('div', 'q-badge');
      badge.style.color = fmt.audio ? 'var(--green)' : 'var(--accent)';
      badge.textContent = fmt.badge;

      const lbl = el('div', 'q-label');
      lbl.textContent = fmt.label;

      btn.appendChild(badge);
      btn.appendChild(lbl);

      if (fmt.size) {
        const sz = el('div', 'q-size');
        sz.textContent = fmt.size;
        btn.appendChild(sz);
      }

      btn.onclick = () => selectQuality(idx, fi);
      grid.appendChild(btn);
    });
    card.appendChild(grid);
    document.getElementById('results').appendChild(card);
  }

  function selectQuality(ci, fi) {
    videoInfos[ci].sel = fi;
    videoInfos[ci].formats.forEach((_, i) => {
      const b = document.getElementById(`q-${ci}-${i}`);
      if (b) b.className = 'qbtn' + (i === fi ? ' selected' : '');
    });
    pywebview.api.set_quality(ci, fi);
  }

  // ── Download ──
  function downloadAll() { pywebview.api.download_all(); }

  function onDlStarted() {
    document.getElementById('dl-btn').disabled      = true;
    document.getElementById('analyse-btn').disabled = true;
    document.getElementById('xlsx-dl-btn').disabled = true;
  }

  function onDlDone() {
    document.getElementById('dl-btn').disabled      = false;
    document.getElementById('analyse-btn').disabled = false;
    document.getElementById('xlsx-dl-btn').disabled = false;
  }

  // ── XLSX ──
  function importXlsx() {
    pywebview.api.import_xlsx().then(r => {
      if (!r) return;
      const s = document.getElementById('xlsx-status');
      if (r.error) {
        s.textContent = '✗ ' + r.error;
        s.className = 'xlsx-status error';
      } else {
        s.textContent = `✓  ${r.filename}  —  ${r.count} lien(s)`;
        s.className = 'xlsx-status ok';
      }
    });
  }

  function downloadXlsx() { pywebview.api.download_xlsx(); }

  // ── Folder ──
  function chooseDir() {
    pywebview.api.choose_dir().then(d => {
      if (d) document.getElementById('folder-path').textContent = d;
    });
  }

  function setTc(mode) { pywebview.api.set_transcode(mode); }

  function openCreator() {
    pywebview.api.open_link('https://youtube.com/@theotimemassard?si=FFIVqWw1d5wMWeXq');
  }

  // ── Helper ──
  function el(tag, cls) {
    const e = document.createElement(tag);
    if (cls) e.className = cls;
    return e;
  }

  // ── Init ──
  window.addEventListener('pywebviewready', () => {
    pywebview.api.get_initial_state().then(state => {
      document.getElementById('folder-path').textContent = state.output_dir;
      if (!state.ffmpeg_available) {
        document.querySelectorAll('input[name="tc"]').forEach(r => r.disabled = true);
        appendLog('⚠  ffmpeg introuvable — brew install ffmpeg');
      }
      const r = document.querySelector(`input[name="tc"][value="${state.transcode_mode}"]`);
      if (r) r.checked = true;
    });
  });
</script>
</body>
</html>
