name: Build — Windows EXE & macOS DMG

on:
  push:
    tags:
      - "v*"          # déclenché par : git tag v1.0 && git push --tags
  workflow_dispatch:  # ou manuellement depuis l'onglet Actions

jobs:

  # ─────────────────────────────────────────────────────────────────────────────
  build-windows:
    name: 🪟 Windows EXE
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install pyinstaller pywebview yt-dlp openpyxl pillow

      - name: Download ffmpeg (Windows)
        run: |
          $url = "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip"
          Invoke-WebRequest -Uri $url -OutFile ffmpeg.zip
          Expand-Archive ffmpeg.zip -DestinationPath ffmpeg_tmp
          $bin = Get-ChildItem -Recurse -Name "ffmpeg.exe" ffmpeg_tmp | Select-Object -First 1
          Copy-Item "ffmpeg_tmp\$bin" ffmpeg.exe
          $binp = Get-ChildItem -Recurse -Name "ffprobe.exe" ffmpeg_tmp | Select-Object -First 1
          Copy-Item "ffmpeg_tmp\$binp" ffprobe.exe
        shell: pwsh

      - name: Build EXE
        run: |
          pyinstaller `
            --onefile `
            --windowed `
            --name GandalfOSINT `
            --collect-all yt_dlp `
            --collect-all webview `
            --add-data "app.html;." `
            --add-data "gandalf.gif;." `
            --add-binary "ffmpeg.exe;." `
            --add-binary "ffprobe.exe;." `
            -y `
            downloader_app.py
        shell: pwsh

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: GandalfOSINT-Windows
          path: dist/GandalfOSINT.exe

  # ─────────────────────────────────────────────────────────────────────────────
  build-macos:
    name: 🍎 macOS DMG
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install pyinstaller pywebview yt-dlp openpyxl pillow
          brew install ffmpeg create-dmg

      - name: Build APP
        run: |
          pyinstaller \
            --onefile \
            --windowed \
            --name GandalfOSINT \
            --icon icon.icns \
            --collect-all yt_dlp \
            --collect-all webview \
            --add-data "app.html:." \
            --add-data "gandalf.gif:." \
            --add-binary "$(which ffmpeg):." \
            --add-binary "$(which ffprobe):." \
            -y \
            downloader_app.py

      - name: Create DMG
        run: |
          create-dmg \
            --volname "Gandalf OSINT" \
            --window-size 600 380 \
            --icon-size 120 \
            --icon "GandalfOSINT.app" 150 185 \
            --app-drop-link 450 185 \
            "GandalfOSINT.dmg" \
            "dist/GandalfOSINT.app"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: GandalfOSINT-macOS
          path: GandalfOSINT.dmg

  # ─────────────────────────────────────────────────────────────────────────────
  release:
    name: 📦 GitHub Release
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            GandalfOSINT-Windows/GandalfOSINT.exe
            GandalfOSINT-macOS/GandalfOSINT.dmg
          generate_release_notes: true
